# infra/cloudrun-service.yaml
# Apply with: gcloud run services replace infra/cloudrun-service.yaml --region=us-central1
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: agentflow
  labels:
    app: agentflow
    env: production
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        # Scale settings
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
        # AlloyDB connector
        run.googleapis.com/cloudsql-instances: ""  # filled by deploy.sh
        # CPU always allocated during request
        run.googleapis.com/cpu-throttling: "false"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      serviceAccountName: ""  # defaults to Compute Engine default SA
      containers:
        - image: us-central1-docker.pkg.dev/PROJECT_ID/agentflow-repo/agentflow:latest
          ports:
            - name: http1
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: REGION
              value: us-central1
            - name: DB_USER
              value: agentflow
            - name: DB_NAME
              value: agentflow
            - name: GOOGLE_CLOUD_PROJECT
              value: "PROJECT_ID_PLACEHOLDER" # Will be replaced by deploy script
            - name: GOOGLE_CLOUD_REGION
              value: "us-central1"
            # Secrets injected at runtime
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: agentflow-db-password
                  key: latest
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
          startupProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            periodSeconds: 30
